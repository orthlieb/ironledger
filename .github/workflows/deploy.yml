name: Deploy

on:
  push:
    branches: [main]
  # Allow manual trigger from the GitHub UI
  workflow_dispatch:

# Prevent concurrent deploys — if a deploy is already running, queue the next
concurrency:
  group: deploy-production
  cancel-in-progress: false   # don't cancel a running deploy; queue instead

jobs:
  deploy:
    name: Deploy to IONOS VPS
    runs-on: ubuntu-latest
    environment: production   # requires approval if configured in repo settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Run a quick smoke test before touching the server
      - name: TypeScript type check
        run: npx tsc --noEmit --project apps/api/tsconfig.json

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.IONOS_HOST }}
          username: ironledger
          key:      ${{ secrets.IONOS_DEPLOY_KEY }}
          timeout:  180s
          script: |
            set -euo pipefail

            cd ~/app

            echo "▶ Pulling latest code..."
            source ~/.nvm/nvm.sh
            git fetch origin main
            git reset --hard origin/main

            echo "▶ Installing dependencies..."
            npm ci

            echo "▶ Building API..."
            npm run build --workspace=apps/api

            echo "▶ Building web app..."
            npm run build --workspace=apps/web

            echo "▶ Running migrations..."
            npm run migrate --workspace=apps/api

            echo "▶ Reloading PM2..."
            pm2 reload ironledger-api --update-env
            pm2 reload ironledger-web --update-env

            echo "✅ Deploy complete."

      - name: Health check
        run: |
          APP_URL="https://${{ secrets.IONOS_DOMAIN }}"
          echo "Checking $APP_URL/login..."

          for i in $(seq 1 12); do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$APP_URL/login" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "✅ Health check passed on attempt $i"
              exit 0
            fi
            echo "  Attempt $i: HTTP $CODE — waiting 5s..."
            sleep 5
          done

          echo "❌ Health check failed after 12 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed. Check the server with: pm2 logs ironledger-api"
          # Add Slack/email notification here if desired
