# Nginx configuration for Iron Ledger on IONOS VPS.
#
# Install to: /etc/nginx/sites-available/ironledger
# Enable with: ln -s /etc/nginx/sites-available/ironledger /etc/nginx/sites-enabled/
#
# Replace YOURDOMAIN.COM with your actual domain before deploying.
# Run certbot after enabling: certbot --nginx -d YOURDOMAIN.COM

# ── Rate limiting zones ───────────────────────────────────────────────────────
# Defined in the http{} context so they survive across location blocks.
# These are a first line of defence at the Nginx layer, before requests even
# reach Node. The API has its own Redis-backed rate limiting on top.

limit_req_zone $binary_remote_addr zone=login:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=register:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m      rate=120r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name YOURDOMAIN.COM;

    # Allow Let's Encrypt ACME challenges through (certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name YOURDOMAIN.COM;

    # ── TLS (managed by Certbot) ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    # Helmet handles these for API responses; these apply to static assets too.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

    # ── Request size limit ────────────────────────────────────────────────────
    # 64KB matches the body limit set in the Fastify server.
    # Nginx rejects oversized requests before they reach Node.
    client_max_body_size 64k;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/ironledger.access.log;
    error_log  /var/log/nginx/ironledger.error.log;

    # ── Static frontend ───────────────────────────────────────────────────────
    # The compiled ironledger.html is the SPA shell.
    # All non-API, non-asset routes serve it (client-side routing).
    root /home/ironledger/app/apps/web/dist;

    location / {
        try_files $uri /ironledger.html;

        # Short cache for the HTML shell — it changes on deploy
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Static assets get long-lived cache (filenames include content hash)
    location ~* \.(js|css|svg|png|ico|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;   # don't fill logs with asset requests
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # All /api/ and /health traffic proxies to the Node process.

    # Specific rate limits for sensitive auth endpoints
    location = /api/v1/auth/login {
        limit_req zone=login    burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    location = /api/v1/auth/register {
        limit_req zone=register burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # All other API routes
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # Health check — no rate limit, used by deploy script and uptime monitors
    location = /health {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
        access_log off;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~ /\. {
        deny all;   # block .env, .git, .htaccess etc.
    }

    location ~* \.(sh|sql|bak|cfg|log)$ {
        deny all;
    }
}
