<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Iron Ledger — Ironsworn character tracker" />
		<!-- Cinzel (engraved display titles) + Crimson Pro (manuscript body) + Roboto (UI labels) -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Roboto:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<!--
			Apply saved theme before first paint to prevent flash.
			"auto" (or missing key) → no attribute → CSS media query decides.
		-->
		<script>
			(function () {
				var t = localStorage.getItem('theme');
				if (t === 'dark' || t === 'light') {
					document.documentElement.setAttribute('data-theme', t);
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
